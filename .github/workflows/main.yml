name: test-all

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  id-token: write

jobs:
  tesing-check:
    name: Run tests and check code quality
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      # check code backend test
      - name: Install backend dependencies 
        run: npm install
        working-directory: ./backend
      - name: Run backend tests
        run: npm test
        working-directory: ./backend
      # check code frontend test
      - name: Install frontend dependencies 
        run: npm install
        working-directory: ./frontend
      - name: Run frontend tests
        run: npm test
        working-directory: ./frontend
      
      #sonarcloud check
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=buicongthanh861_project-aws-gitops
            -Dsonar.organization=java-woof
            -Dsonar.host.url=https://sonarcloud.io/
      #sonarcloud quality gate check
      - name: SonarCloud Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      #synk check backend

      - name: Snyk Scan Backend
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN_AWS }}
        with:
          args: --org=buicongthanh861 --all-projects --severity-threshold=high
        continue-on-error: true
  
  #build and deploy to aws
  build-and-deploy:
    name: Build and deploy to AWS
    runs-on: ubuntu-latest
    needs: tesing-check
    if: github.event_name == 'push'
    
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Backend Image to Amazon ECR
        id: build-backend-image
        env:
          ECR_REGISTRY: 159749281332.dkr.ecr.ap-southeast-1.amazonaws.com
          ECR_REPOSITORY: project-aws-gitops-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY --all-tags
      
      - name: Build, tag, and push Frontend Image to Amazon ECR
        id: build-frontend-image
        env:
          ECR_REGISTRY: 159749281332.dkr.ecr.ap-southeast-1.amazonaws.com
          ECR_REPOSITORY: project-aws-gitops-frontend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./frontend
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY --all-tags

        

  
  




