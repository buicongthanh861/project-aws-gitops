apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fullstack-application
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/buicongthanh861/project-aws-gitops
    targetRevision: HEAD
    path: deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: fullstack-application
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
